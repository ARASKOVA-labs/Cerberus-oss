name: ci

on:
  push:
  pull_request:

jobs:
  rust:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --all --check
      - run: cargo check --workspace
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: pip install -r requirements-report.txt
      - run: python -m py_compile scripts/reportlab_report.py
      - run: cargo run -p cerberus-cli -- mission "ci security audit smoke test"
      - run: cargo run -p cerberus-cli -- findings add --title "CI sample finding" --severity low --evidence "CI evidence record." --remediation "CI remediation note."
      - run: cargo run -p cerberus-cli -- report export --format pdf
